services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: improvement-tracker-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - improvement-network

  web:
    image: nginx:alpine
    container_name: improvement-tracker-web
    restart: unless-stopped
    ports:
      - "6004:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - improvement-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: improvement-tracker-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - improvement-network

networks:
  improvement-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
